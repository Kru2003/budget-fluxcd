apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-helm-release
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 75.3.0
    sourceRef:
      kind: HelmRepository
      name: prometheus-helm-repository
