apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-helm-release
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 75.3.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-helm-repository
  values:
    prometheus:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - prometheus.local
        paths:
          - "/"
        pathType: Prefix
    grafana:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.local
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "cluster", "service"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 1h
          receiver: "mattermost"
          routes:
            - receiver: "mattermost"
              matchers:
                - severity=warning
                - severity=critical
        receivers:
          - name: "mattermost"
            slack_configs:
              - api_url: https://talk.improwised.com/hooks/yupgbkdfafn37job4xh3z5n1ky

    additionalPrometheusRuleMap:
      budget-app-alerts:
        groups:
          - name: BudgetAppAlerts
            rules:
              - alert: ImageChanged
                expr: |
                  count(
                  kube_pod_container_info{namespace='budget'} unless
                  kube_pod_container_info{namespace='budget'} offset 2m
                  ) by (namespace, pod, container, image) > 0
                for: 1m
                labels:
                  severity: warning
                annotations:
                  summary: "Container image changed"
                  description: "The image of container in pod {{ $labels.pod }} has changed to {{ $labels.image }}"
