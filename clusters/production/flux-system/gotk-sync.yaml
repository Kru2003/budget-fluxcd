apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: budget-repo
  namespace: flux-system
spec:
  interval: 1m0s
  secretRef:
    name: ssh-credentials
  url: ssh://git@github.com/Kru2003/budget-fluxcd.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: budget-repo
  namespace: flux-system
spec:
  interval: 1m0s
  targetNamespace: budget
  path: ./clusters/production
  sourceRef:
    kind: GitRepository
    name: budget-repo
