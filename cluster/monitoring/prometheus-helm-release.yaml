apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-helm-release
  namespace: flux-system
spec:
  interval: 1h
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 75.3.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-helm-repository
  values:
    prometheus:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - prometheus.local
        paths:
          - "/"
        pathType: Prefix
    grafana:
      ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
          - grafana.local
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: ["alertname", "cluster", "service"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "mattermost"
          routes:
            - receiver: "mattermost"
              matchers:
                - severity=warning
                - severity=critical
        receivers:
          - name: "mattermost"
            slack_configs:
              - api_url: https://talk.improwised.com/hooks/yupgbkdfafn37job4xh3z5n1ky

    additionalPrometheusRulesMap:
      budget-app-alerts:
        groups:
          - name: BudgetAppAlerts
            rules:
            - alert: DeploymentSpecChanged
              expr: |
                changes(kube_deployment_status_observed_generation{namespace='budget'}[5m]) > 0
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Deployment {{ $labels.deployment }} has been updated"
                description: "The configuration for deployment '{{ $labels.deployment }}' in namespace '{{ $labels.namespace }}' has changed. This indicates a new rollout has likely started. Current generation: {{ $value }}."
            - alert: DeploymentDeleted
              expr: |
                absent(kube_deployment_created{namespace='budget'})
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Kubernetes Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has been deleted."
                description: "The 'kube_deployment_created' metric for deployment '{{ $labels.deployment }}' in namespace '{{ $labels.namespace }}' is no longer present. This indicates the Deployment has likely been deleted. Please verify."
