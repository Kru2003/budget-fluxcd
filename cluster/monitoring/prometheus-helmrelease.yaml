apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: monitoring
spec:
  interval: 10m
  targetNamespace: monitoring
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 87.17.0
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
  values:
    prometheus:
      ingress:
        enabled: false
        ingressClassName: nginx
        hosts:
          - prometheus.local
        paths:
          - "/"
        pathType: Prefix
    grafana:
      ingress:
        enabled: false
        ingressClassName: nginx
        hosts:
          - grafana.local
    alertmanager:
      config:
        global:
          resolve_timeout: 5m
          smtp_smarthost: "smtp.gmail.com:587"
          smtp_from: "kruvaishnav20@gmail.com"
          smtp_auth_username: "kruvaishnav20@gmail.com"
          smtp_require_tls: true
        inhibit_rules:
          - source_match:
              severity: "critical"
            target_match:
              severity: "warning"
            equal:
              - namespace
        route:
          receiver: "mail"
          routes:
            - receiver: "mail"
        receivers:
          - name: "mail"
            email_configs:
              - to: "kruvaishnav20@gmail.com"
                send_resolved: true
    defaultRules:
      rules:
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
    additionalPrometheusRulesMap:
      budget-app-alerts:
        groups:
          - name: BudgetAppAlerts
            rules:
            - alert: DeploymentSpecChanged
              expr: |
                changes(kube_deployment_status_observed_generation{namespace='budget'}[5m]) > 0
              for: 1m
              labels:
                severity: warning
              annotations:
                summary: "Deployment {{ $labels.deployment }} has been updated"
                description: "The configuration for deployment '{{ $labels.deployment }}' in namespace '{{ $labels.namespace }}' has changed. This indicates a new rollout has likely started. Current generation: {{ $value }}."
            - alert: DeploymentDeleted
              expr: |
                absent(kube_deployment_created{namespace='budget'})
              for: 5m
              labels:
                severity: critical
              annotations:
                summary: "Kubernetes Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has been deleted."
                description: "The 'kube_deployment_created' metric for deployment '{{ $labels.deployment }}' in namespace '{{ $labels.namespace }}' is no longer present. This indicates the Deployment has likely been deleted. Please verify."
  valuesFrom:
    - kind: Secret
      name: smtp-auth
      valuesKey: smtp_auth_password
      targetPath: alertmanager.config.global.smtp_auth_password