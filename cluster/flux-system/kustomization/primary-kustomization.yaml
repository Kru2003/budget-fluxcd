apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: primary
  namespace: flux-system
spec:
  interval: 10m
  path: cluster/flux-system
  prune: false
  sourceRef:
    kind: GitRepository
    name: primary
  decryption:
    provider: sops
    secretRef:
      name: sops-age