apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: budget
  namespace: budget
spec:
  filterTags:
    pattern: "^main-[a-fA-F0-9]+-(?P<ts>.*)"
    extract: "$ts"
  imageRepositoryRef:
    name: budget
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: IfNotPresent