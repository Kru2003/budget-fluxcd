apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: budget
  namespace: budget
spec:
  chart:
    spec:
      chart: ./charts/budget-chart
      version: 0.1.x
      sourceRef:
        kind: GitRepository
        name: primary
      interval: 1h # this interval is for fetching version of chart
  interval: 10m # this interval is for diff
  values:
    imagePullSecrets:
      - name: image-registry
    image:
      tag: main-790a552-1751522394 # {"$imagepolicy": "budget:budget:tag"}
