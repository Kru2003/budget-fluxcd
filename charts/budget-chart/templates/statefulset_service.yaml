apiVersion: v1
kind: Service
metadata:
  name: {{ include "budget-chart.fullname" . }}-headless-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "budget-chart.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.statefulset.containerPort }}
      targetPort: database-port
      protocol: TCP
      name: database-port
  selector:
    {{- include "budget-chart.statefulsetSelectorLabels" . | nindent 4 }}
